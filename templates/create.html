<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
  <title>Create ToDO</title>
</head>
<body style = "background-color : bisque">
 
  {% include 'navbar.html' %}
{% if method == 'edit' %}
  <form method = "POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="name" class="form-label">ToDO-Name</label>
      <input type="text" class="form-control" id="Name" name ="name" value="{{object.name}}">
    </div>
    <div class="mb-3">
        <label for="description">Description</label>
        <textarea class="form-control" id="description" name = "description" >{{object.description}}</textarea>
      </div>
      <div class="mb-3">
      <label for="Status">Select Status</label>
      <select class="form-select" aria-label="Default select example" name ="status">
        <!-- <option selected></option> -->
        {% if object.status == 'Done' %}
          <option value="Done">Done</option>
          <option value="Not Done">Not Done</option>
        {% elif object.status == 'Not Done' %}
        <option value="Not Done">Not Done</option>
          <option value="Done">Done</option>

        {% endif %}
      </select>
    </div>
    <button class="btn btn-primary" type="submit">Create </button>
    
  </form>
{% endif %}
{% if method == 'create' %}
    <form method = "POST">
        {%csrf_token%}
        <div class="mb-3">
          <label for="name" class="form-label">ToDO-Name</label>
          <input type="text" class="form-control" id="Name" name ="name">
        </div>
        <!-- </form> -->
        <div class="mb-3">
            <label for="description">Description</label>
            <textarea class="form-control" id="description" name = "description"></textarea>
          </div>
          <div class="mb-3">
          <label for="Status">Select Status</label>
          <select class="form-select" aria-label="Default select example" name ="status">
            <option selected></option>
            <option value="Done">Done</option>
            <option value="Not Done">Not Done</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit">Create </button>
      </form>
      {% endif %}
</body>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.min.js" integrity="sha384-Rx+T1VzGupg4BHQYs2gCW9It+akI2MM/mndMCy36UVfodzcJcF0GGLxZIzObiEfa" crossorigin="anonymous"></script>
</html>
